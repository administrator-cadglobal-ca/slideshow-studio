<header class="h-16 flex items-center justify-between px-4 md:px-8 border-b border-line sticky top-0 z-20 bg-paper/90 backdrop-blur">
  <h1 class="text-h2 truncate flex-1">{% block page_title %}{% endblock %}</h1>
  {% if current_user.is_authenticated %}
  <a href="{{ url_for('auth.logout') }}"
     class="md:hidden btn-icon ml-2"
     aria-label="Sign out">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
      <polyline points="16 17 21 12 16 7"></polyline>
      <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
  </a>
  {% endif %}
</header>
