{% extends "shared/base.html" %}
{% block title %}Enter password{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 p-6">
  <div class="bg-white rounded-comfortable border border-line p-8">
    <div class="mx-auto w-14 h-14 rounded-full bg-indigo-soft flex items-center justify-center mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <h1 class="text-h1 text-center mb-2">Enter password</h1>
    {% if description %}
      <p class="text-small text-ink-soft text-center mb-6">{{ description }}</p>
    {% else %}
      <p class="text-small text-ink-soft text-center mb-6">This slideshow is password-protected.</p>
    {% endif %}

    <form method="POST" action="{{ url_for('share.view_share', token=token) }}">
      <input type="password" name="password" required autofocus
             class="input w-full text-h2 tracking-widest text-center"
             placeholder="Password">
      {% if error %}
        <p class="text-caption text-rose-700 mt-2">{{ error }}</p>
      {% endif %}
      <button type="submit" class="btn-primary w-full mt-4">View slideshow</button>
    </form>
  </div>
</div>
{% endblock %}
