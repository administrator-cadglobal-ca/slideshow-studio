{% extends "shared/base.html" %}
{% block title %}Access Video{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-16">
  <div class="bg-white rounded-comfortable shadow p-6 space-y-4">
    <div class="text-center">
      <h1 class="text-h3 text-ink">Enter password to watch</h1>
      <p class="text-caption text-ink-soft mt-1">This video is password protected.</p>
    </div>
    <form method="post" class="space-y-3">
      <label class="block">
        <span class="text-caption text-ink-soft">Password</span>
        <input type="text" name="password" required autofocus class="input mt-1 w-full text-small">
      </label>
      {% if error %}
      <p class="text-caption text-rose-700">{{ error }}</p>
      {% endif %}
      <button type="submit" class="btn-primary w-full">Watch video</button>
    </form>
  </div>
</div>
{% endblock %}
