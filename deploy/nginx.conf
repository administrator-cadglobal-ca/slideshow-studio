server {
    listen 80;
    server_name slideshow.x4dglobal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name slideshow.x4dglobal.com;

    ssl_certificate     /etc/letsencrypt/live/slideshow.x4dglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slideshow.x4dglobal.com/privkey.pem;

    client_max_body_size 200M;

    # ── Static files served directly by Nginx ──────────────────────────────────
    location /static/ {
        alias /var/slideshow/app/static/;
        expires 30d;
    }

    # ── Output file downloads ──────────────────────────────────────────────────
    location /downloads/ {
        internal;
        alias /var/slideshow/storage/;
    }

    # ── SSE progress stream — disable buffering ────────────────────────────────
    location /api/v1/renders/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   X-Accel-Buffering no;
        proxy_read_timeout 600s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Everything else → Gunicorn ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
